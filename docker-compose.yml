#version: '3.8'

services:

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: alborada_app:latest
    container_name: alborada_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - alborada
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: nginx:1.25-alpine
    container_name: alborada_nginx
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - alborada

  db:
    image: mysql:8.0
    container_name: alborada_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: alborada
      MYSQL_USER: alborada
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    # No host port binding — Docker containers reach MySQL via internal network (db:3306).
    # Host MariaDB (used by XUI.ONE) occupies 127.0.0.1:3306; exposing this port here
    # would cause EADDRINUSE on production.
    # For local dev access add to docker-compose.local.yml:
    #   db:
    #     ports:
    #       - "127.0.0.1:3306:3306"
    networks:
      - alborada

  worker:
    image: alborada_app:latest
    container_name: alborada_worker
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - alborada
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  composer:
    image: composer:2
    container_name: alborada_composer
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - alborada

volumes:
  dbdata:

networks:
  alborada:
    driver: bridge
