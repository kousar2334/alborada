# When the upstream proxy (production Nginx) terminates SSL and forwards
# X-Forwarded-Proto: https, map it to HTTPS=on for PHP and to HSTS header.
map $http_x_forwarded_proto $fastcgi_https {
    https   on;
    default "";
}

map $http_x_forwarded_proto $hsts_header {
    https   "max-age=31536000; includeSubDomains";
    default "";
}

server {
    listen 80;
    server_name _;

    root  /var/www/html;
    index index.php;

    client_max_body_size 100M;

    # Security headers
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-Frame-Options          "SAMEORIGIN"                        always;
    add_header X-XSS-Protection         "1; mode=block"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security $hsts_header                       always;

    # Static assets — served directly from public/
    # 'storage' is a symlink created by 'php artisan storage:link'
    location ~ ^/(web-assets|build|uploads|uploaded|profile|featured|bank-slips|storage)(/|$) {
        root /var/www/html/public;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /favicon.ico {
        root /var/www/html/public;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        root /var/www/html/public;
        access_log off;
        log_not_found off;
    }

    # Block access to all sensitive project directories and files
    # Note: 'storage' is intentionally omitted — /storage/ is already handled
    # above by the static files location (serves public/storage symlink).
    location ~ ^/(app|bootstrap|config|database|resources|routes|tests|vendor|docker)(/|$) {
        deny all;
        return 404;
    }

    location ~ ^/(artisan|composer\.(json|lock)|package(-lock)?\.json|webpack\.mix\.js|vite\.config\.(js|ts)|\.env.*) {
        deny all;
        return 404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    # Laravel — all other requests
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  app:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTPS           $fastcgi_https;
        fastcgi_hide_header X-Powered-By;
    }
}
